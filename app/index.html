<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>열대어 도감 - 프로토타입</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0B1620">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="열대어도감">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

  :root{
    --bg:#0B1620;
    --surface:#122333;
    --surface-2:#17293b;
    --line:#223449;
    --teal:#38B6A3;
    --teal-dim:#2a8a7c;
    --amber:#F2A65A;
    --text:#E8F1F2;
    --muted:#7C93A0;
    --danger:#E0714F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:36px 24px 80px;}

  header{margin-bottom:28px;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:.12em;
    color:var(--teal);
    text-transform:uppercase;
    display:flex;align-items:center;gap:8px;
  }
  .eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);}
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:34px;
    margin:8px 0 6px;
    letter-spacing:-0.01em;
  }
  .sub{color:var(--muted);font-size:14px;max-width:520px;line-height:1.6;}

  .waveline{width:100%;height:14px;margin:20px 0 28px;opacity:.6;}

  .controls{
    display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;
  }
  .search{
    flex:1;min-width:220px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 14px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    outline:none;
  }
  .search:focus{border-color:var(--teal);}
  .filter-btn{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:10px;
    padding:11px 14px;
    font-size:13px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    transition:.15s;
  }
  .filter-btn.active{border-color:var(--teal);color:var(--teal);}
  .filter-btn:hover{border-color:var(--teal-dim);}

  .select-wrap{position:relative;}
  .select-wrap::after{
    content:"▾";
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:11px;pointer-events:none;
  }
  select.tank-filter{
    appearance:none;-webkit-appearance:none;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:10px;
    padding:11px 30px 11px 14px;
    font-size:13px;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    outline:none;
  }
  select.tank-filter:focus{border-color:var(--teal);}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:14px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    cursor:pointer;
    transition:.18s;
    position:relative;
    overflow:hidden;
  }
  .card:hover{border-color:var(--teal-dim);transform:translateY(-2px);}
  .card .tag{
    position:absolute;top:14px;right:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    letter-spacing:.05em;
  }
  .fish-icon{width:64px;height:34px;margin-bottom:10px;}
  .card h3{font-family:'Space Grotesk',sans-serif;font-size:18px;margin:0 0 2px;}
  .card .latin{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:12px;}
  .mini-spec{display:flex;gap:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .mini-spec b{color:var(--text);font-weight:600;}

  /* detail overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(6,12,18,.72);
    display:none;align-items:flex-start;justify-content:center;
    padding:40px 20px;overflow-y:auto;z-index:10;
    backdrop-filter:blur(3px);
  }
  .overlay.open{display:flex;}
  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:18px;
    max-width:640px;width:100%;
    padding:32px;
    position:relative;
  }
  .close{
    position:absolute;top:20px;right:20px;
    background:none;border:none;color:var(--muted);
    font-size:20px;cursor:pointer;line-height:1;
  }
  .close:hover{color:var(--text);}
  .panel-head{display:flex;align-items:center;gap:16px;margin-bottom:6px;}
  .panel-head .fish-icon{width:70px;height:38px;margin:0;flex-shrink:0;}
  .panel h2{font-family:'Space Grotesk',sans-serif;font-size:26px;margin:0;}
  .panel .latin{font-size:13px;color:var(--muted);font-style:italic;margin-top:2px;}

  .badges{display:flex;gap:8px;margin:16px 0 24px;flex-wrap:wrap;}
  .badge{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:5px 10px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--muted);
  }
  .badge.diff-초급{color:var(--teal);border-color:var(--teal-dim);}
  .badge.diff-중급{color:var(--amber);border-color:#8a5f2f;}
  .badge.diff-고급{color:var(--danger);border-color:#8a4330;}

  .spec-section{margin-bottom:22px;}
  .spec-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.08em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .range-row{margin-bottom:14px;}
  .range-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
  .range-head .name{color:var(--text);}
  .range-head .val{font-family:'JetBrains Mono',monospace;color:var(--teal);font-weight:600;}
  .range-track{
    height:6px;border-radius:4px;background:var(--surface-2);
    position:relative;overflow:hidden;
  }
  .range-fill{
    position:absolute;top:0;bottom:0;
    background:linear-gradient(90deg,var(--teal-dim),var(--teal));
    border-radius:4px;
  }

  .facts{
    display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;
    font-size:13px;
  }
  .fact-label{color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
  .fact-val{margin-top:2px;}

  .tips{
    background:var(--surface-2);
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    line-height:1.7;
    color:var(--text);
    border-left:2px solid var(--amber);
  }

  .empty{
    text-align:center;color:var(--muted);padding:60px 0;font-size:14px;
  }

  @media (max-width:480px){
    .facts{grid-template-columns:1fr;}
  }

  /* Tabs */
  .tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--line);}
  .tab-btn{
    background:none;border:none;color:var(--muted);
    font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:500;
    padding:10px 4px 12px;cursor:pointer;position:relative;
  }
  .tab-btn.active{color:var(--text);}
  .tab-btn.active::after{
    content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;
    background:var(--teal);box-shadow:0 0 8px var(--teal);
  }

  /* Compatibility checker */
  .compat-pickers{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
  .compat-pick{flex:1;min-width:220px;position:relative;}
  .suggest-list{
    position:absolute;top:100%;left:0;right:0;z-index:20;margin-top:4px;
    background:var(--surface);border:1px solid var(--line);border-radius:10px;
    max-height:240px;overflow-y:auto;display:none;
  }
  .suggest-list.open{display:block;}
  .suggest-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line);}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:hover{background:var(--surface-2);}
  .suggest-item .alias-match{color:var(--muted);font-size:11px;margin-top:2px;}
  .compat-pick label{
    display:block;font-family:'JetBrains Mono',monospace;font-size:11px;
    color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;
  }
  .compat-pick input{
    width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;
  }
  .compat-pick input:focus{border-color:var(--teal);}
  .compat-vs{
    font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--muted);
    padding-top:20px;
  }
  .compat-btn{
    background:var(--teal);border:none;color:#06231f;font-weight:600;
    border-radius:10px;padding:13px 22px;font-size:14px;cursor:pointer;
    font-family:'Inter',sans-serif;align-self:flex-end;margin-top:20px;
    transition:.15s;
  }
  .compat-btn:hover{background:#4fcab5;}
  .compat-btn:disabled{background:var(--surface-2);color:var(--muted);cursor:not-allowed;}

  .verdict-banner{
    border-radius:14px;padding:20px 24px;margin-bottom:24px;
    display:flex;align-items:center;gap:16px;border:1px solid;
  }
  .verdict-banner.ok{background:rgba(56,182,163,.1);border-color:var(--teal-dim);}
  .verdict-banner.caution{background:rgba(242,166,90,.1);border-color:#8a5f2f;}
  .verdict-banner.bad{background:rgba(224,113,79,.1);border-color:#8a4330;}
  .verdict-icon{font-size:28px;line-height:1;}
  .verdict-title{font-family:'Space Grotesk',sans-serif;font-size:19px;margin:0 0 3px;}
  .verdict-sub{font-size:13px;color:var(--muted);}

  .compat-pair-head{display:flex;gap:16px;margin-bottom:20px;}
  .compat-fish-card{
    flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;display:flex;align-items:center;gap:12px;
  }
  .compat-fish-card .fish-icon{width:44px;height:24px;margin:0;flex-shrink:0;}
  .compat-fish-card h4{margin:0;font-family:'Space Grotesk',sans-serif;font-size:15px;}
  .compat-fish-card .latin{font-size:11px;color:var(--muted);font-style:italic;}

  .dual-range-row{margin-bottom:18px;}
  .dual-range-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
  .dual-track{
    height:22px;border-radius:6px;background:var(--surface-2);position:relative;overflow:hidden;
  }
  .dual-fill{position:absolute;height:8px;border-radius:4px;}
  .dual-fill.a{top:2px;}
  .dual-fill.b{bottom:2px;}
  .overlap-zone{
    position:absolute;top:0;bottom:0;background:rgba(56,182,163,.28);
    border-left:1px dashed var(--teal);border-right:1px dashed var(--teal);
  }
  .overlap-zone.none{display:none;}
  .dual-legend{display:flex;gap:16px;font-size:11px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace;}
  .dual-legend span{display:flex;align-items:center;gap:5px;}
  .legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;}

  .reason-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px;}
  .reason-item{
    display:flex;gap:10px;font-size:13px;line-height:1.6;padding:12px 14px;
    background:var(--surface);border-radius:10px;border-left:3px solid var(--line);
  }
  .reason-item.ok{border-left-color:var(--teal);}
  .reason-item.caution{border-left-color:var(--amber);}
  .reason-item.bad{border-left-color:var(--danger);}
  .reason-mark{flex-shrink:0;font-weight:700;}

  .compat-empty{text-align:center;color:var(--muted);padding:60px 0;font-size:14px;}

  /* Tank-wide checker */
  .tank-add-row{position:relative;max-width:420px;margin-bottom:16px;}
  .tank-add-row input{
    width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;
  }
  .tank-add-row input:focus{border-color:var(--teal);}
  .tank-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;min-height:20px;}
  .tank-chip{
    display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
    border-radius:20px;padding:7px 8px 7px 14px;font-size:13px;
  }
  .tank-chip button{
    background:var(--surface-2);border:none;color:var(--muted);width:20px;height:20px;border-radius:50%;
    cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .tank-chip button:hover{background:var(--danger);color:#fff;}
  .pair-row{
    display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface);
    border-radius:10px;border-left:3px solid var(--line);margin-bottom:10px;
  }
  .pair-row.ok{border-left-color:var(--teal);}
  .pair-row.caution{border-left-color:var(--amber);}
  .pair-row.bad{border-left-color:var(--danger);}
  .pair-row .pair-mark{font-weight:700;flex-shrink:0;width:18px;text-align:center;}
  .pair-row .pair-names{font-family:'Space Grotesk',sans-serif;font-size:14px;margin-bottom:4px;}
  .pair-row .pair-reasons{font-size:12px;color:var(--muted);line-height:1.6;}

  /* My Tank feature */
  .mytank-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .tank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
  .tank-card{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:18px;cursor:pointer;transition:.15s;
  }
  .tank-card:hover{border-color:var(--teal-dim);transform:translateY(-2px);}
  .tank-card h3{font-family:'Space Grotesk',sans-serif;font-size:17px;margin:0 0 6px;}
  .tank-card .liter-badge{
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--teal);
    background:rgba(56,182,163,.12);padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:8px;
  }
  .tank-card .tank-meta{font-size:12px;color:var(--muted);}
  .tank-card .due-badge{
    display:inline-block;margin-top:8px;font-size:11px;font-family:'JetBrains Mono',monospace;
    color:var(--danger);background:rgba(224,113,79,.12);padding:3px 8px;border-radius:20px;
  }

  .form-row{margin-bottom:14px;}
  .form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
  .form-row input, .form-row select{
    width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;
  }
  .form-row input:focus, .form-row select:focus{border-color:var(--teal);outline:none;}
  .form-inline{display:flex;gap:10px;}
  .form-inline .form-row{flex:1;}

  .detail-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:16px;padding:0;}
  .detail-back:hover{color:var(--teal);}
  .detail-tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--line);}
  .detail-tab-btn{
    background:none;border:none;color:var(--muted);padding:9px 4px 11px;margin-right:16px;
    cursor:pointer;font-size:13px;position:relative;font-family:'Inter',sans-serif;
  }
  .detail-tab-btn.active{color:var(--text);}
  .detail-tab-btn.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--teal);}

  .stock-bar-track{height:10px;border-radius:5px;background:var(--surface-2);overflow:hidden;margin:8px 0;}
  .stock-bar-fill{height:100%;border-radius:5px;}

  .log-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px;}
  .log-table th{text-align:left;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 8px;border-bottom:1px solid var(--line);}
  .log-table td{padding:8px;border-bottom:1px solid var(--line);}
  .log-table tr:last-child td{border-bottom:none;}

  .reminder-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--surface);border-radius:10px;padding:12px 16px;margin-bottom:10px;
    border-left:3px solid var(--line);
  }
  .reminder-row.overdue{border-left-color:var(--danger);}
  .reminder-row.due-today{border-left-color:var(--amber);}
  .reminder-row .r-label{font-size:14px;}
  .reminder-row .r-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .reminder-row .r-actions{display:flex;gap:8px;}
  .btn-small{
    background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;
  }
  .btn-small:hover{border-color:var(--teal);}
  .btn-small.danger:hover{border-color:var(--danger);color:var(--danger);}

  .chart-wrap{background:var(--surface);border-radius:12px;padding:16px;margin:16px 0;}
  .chart-legend{display:flex;gap:16px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;">
      <div>
        <div class="eyebrow" id="eyebrowText">species database — v0.1 prototype</div>
        <h1 id="appTitle">열대어 도감</h1>
        <p class="sub" id="appSubtitle">어종별 사육 조건을 확인하세요. 현재 147종(121개 케어그룹)이 반영되어 있습니다. 색상 변이가 많은 어종은 '유통명'으로 검색해도 찾을 수 있어요.</p>
      </div>
      <select id="langSelect" class="tank-filter" style="width:auto;flex-shrink:0;">
        <option value="ko">한국어</option>
        <option value="en">English</option>
      </select>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dex" id="tabBtnDex">종 도감</button>
    <button class="tab-btn" data-tab="compat" id="tabBtnCompat">합사 체크 (2종)</button>
    <button class="tab-btn" data-tab="tank" id="tabBtnTank">어항 구성 체크</button>
    <button class="tab-btn" data-tab="mytank" id="tabBtnMyTank">내 어항</button>
  </div>

  <div id="dexPanel"></div>
  <div id="compatPanelWrap" style="display:none;"></div>
  <div id="tankPanelWrap" style="display:none;"></div>
  <div id="myTankPanelWrap" style="display:none;"></div>
</div>

<div class="overlay" id="overlay">
  <div class="panel" id="panel"></div>
</div>

<script>
// ---------------------------------------------------------------
// i18n (한국어 / English)
// 범위: UI 메뉴/버튼/라벨/필터/뱃지 텍스트, 종 이름(nameEn 활용).
// 범위 밖: 종별 사육팁/노트/합사체크 사유 문장 등 긴 서술형 텍스트는
// 데이터양이 매우 많아(120+ 그룹) 이번 범위에서는 한국어로 유지함.
// React 마이그레이션 시 정식 i18n 라이브러리(react-i18next 등)로 재작업 권장.
// ---------------------------------------------------------------
const LANG_KEY = 'fishAppLang_v1';
let currentLang = localStorage.getItem(LANG_KEY) || 'ko';

const I18N = {
  ko: {
    eyebrow: 'species database — v0.1 prototype',

function t(key, ...args){
  const entry = I18N[currentLang][key];
  return typeof entry === 'function' ? entry(...args) : entry;
}
function speciesDisplayName(s){
  return currentLang === 'ko' ? s.name : (s.nameEn || s.name);
}
function translateDifficulty(d){
  const map = {'초급':'diffBeginner','중급':'diffIntermediate','고급':'diffAdvanced'};
  return map[d] ? t(map[d]) : d;
}
function translateTemperament(temp){
  const map = {'peaceful':'temperamentPeaceful','semi-aggressive':'temperamentSemi','aggressive':'temperamentAggressive'};
  return map[temp] ? t(map[temp]) : temp;
}
function translateWaterLevel(wl){
  if(currentLang === 'ko') return wl;
  return wl.split('~').map(part=>{
    if(part.includes('상')) return 'Top';
    if(part.includes('중')) return 'Mid';
    if(part.includes('하')) return 'Bottom';
    if(part.includes('전')) return 'All';
    return part;
  }).join('~');
}

function getSpec(s){
  // Merge group-level care spec with species-level identity fields.
  // Species-level fields (if present) override group defaults.
  return Object.assign({}, careGroups[s.groupId], s);
}

function rangeBar(low, high, min, max){
  const leftPct = ((low-min)/(max-min))*100;

}

function tankCategory(tankMin){
  if(tankMin <= 40) return '소형';
  if(tankMin <= 150) return '중형';
  return '대형';
}
function tankCategoryLabel(tankMin){
  const cat = tankCategory(tankMin);
  const map = {'소형':'tankSizeSmall','중형':'tankSizeMedium','대형':'tankSizeLarge'};
  return t(map[cat]);
}

function render(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const grid = document.getElementById('grid');
  const filtered = speciesList.filter(s=>{
    const f = getSpec(s);
    const aliasMatch = s.aliases && s.aliases.some(a=>a.toLowerCase().includes(q));
    const matchesQ = !q || s.name.toLowerCase().includes(q) || s.nameEn.toLowerCase().includes(q) || s.latin.toLowerCase().includes(q) || aliasMatch;
    const matchesDiff = activeDiff==='all' || f.difficulty===activeDiff;
    const matchesTank = activeTankSize==='all' || tankCategory(f.tankMin)===activeTankSize;
    const matchesTemperament = activeTemperament==='all' || f.temperament===activeTemperament;
    const matchesWaterLevel = activeWaterLevel==='all' || f.waterLevel.includes(activeWaterLevel);
    const matchesGenus = activeGenus==='all' || s.genus===activeGenus;
    return matchesQ && matchesDiff && matchesTank && matchesTemperament && matchesWaterLevel && matchesGenus;
  });
  grid.innerHTML = filtered.map(card).join('');
  document.getElementById('emptyMsg').style.display = filtered.length? 'none':'block';

  grid.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click', ()=>openDetail(el.dataset.id));
  });
}

function openDetail(id){
  const s = speciesList.find(x=>x.id===id);
  const panel = document.getElementById('panel');
  panel.innerHTML = detailPanel(s);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('closeBtn').addEventListener('click', closeDetail);
}
function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id==='overlay') closeDetail();
});

function displayLabel(s){
  const primary = speciesDisplayName(s);
  const secondary = currentLang === 'ko' ? s.nameEn : s.name;
  return (secondary && secondary !== primary) ? `${primary} (${secondary})` : primary;
}

// 부분 일치(substring) 검색 — 이름/영문명/학명/유통명 전부 대상.
// 네이티브 <datalist>는 브라우저마다 앞글자 일치만 지원하는 경우가 많아서
// "피라냐"처럼 이름 중간 단어로는 못 찾는 문제가 있어 직접 구현함.
// 검색어가 비어있으면(=포커스만 준 상태) 전체 목록을 보여줘서 검토하기 쉽게 함.
function searchSpecies(query){
  const q = query.trim().toLowerCase();
  if(!q){
    return speciesList.slice().sort((a,b)=> displayLabel(a).localeCompare(displayLabel(b), 'ko'));
  }
  return speciesList.filter(s=>{
    if(s.name.toLowerCase().includes(q)) return true;
    if(s.nameEn && s.nameEn.toLowerCase().includes(q)) return true;
    if(s.latin.toLowerCase().includes(q)) return true;
    if((s.aliases||[]).some(a=>a.toLowerCase().includes(q))) return true;
    return false;
  }).slice(0, 20);
}

let selectedCompatA = null;
let selectedCompatB = null;

function attachAutocomplete(inputId, listId, onSelect, onType){
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);

  function renderList(){
    const q = input.value.trim().toLowerCase();
    const results = searchSpecies(input.value);
    if(!results.length){ list.classList.remove('open'); list.innerHTML=''; return; }
    list.innerHTML = results.map(s=>{
      const matchedAlias = (s.aliases||[]).find(a=>a.toLowerCase().includes(q));
      const aliasNote = (q && !s.name.toLowerCase().includes(q) && matchedAlias)
        ? `<div class="alias-match">유통명: ${matchedAlias}</div>` : '';
      return `<div class="suggest-item" data-id="${s.id}">${displayLabel(s)}${aliasNote}</div>`;
    }).join('');
    list.classList.add('open');
    list.querySelectorAll('.suggest-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        const s = speciesList.find(x=>x.id===el.dataset.id);
        input.value = displayLabel(s);
        onSelect(s);
        list.classList.remove('open');
      });
    });
  }

  input.addEventListener('input', ()=>{ onType(); renderList(); });
  input.addEventListener('focus', renderList);

  document.addEventListener('click', (e)=>{
    if(e.target !== input && !list.contains(e.target)) list.classList.remove('open');
  });
}

function findSpeciesByInput(value){
  const v = (value || '').trim();
  if(!v) return null;
  const byLabel = speciesList.find(s => displayLabel(s) === v);
  if(byLabel) return byLabel;
  return speciesList.find(s =>
    s.name === v || s.nameEn === v || (s.aliases||[]).includes(v)
  ) || null;
}

// ---------------------------------------------------------------
// 합사 판정 엔진 v2 — 숫자 합산 대신 카테고리 매트릭스 + 단계적
// 다운그레이드 규칙으로 처리 (설명 가능한 구조 유지가 목적)
// ---------------------------------------------------------------

function overlapRange(a, b){
  const lo = Math.max(a[0], b[0]);
  const hi = Math.min(a[1], b[1]);
  return lo <= hi ? [lo, hi] : null;
}

// 2단계: 성격 x 성격 매트릭스. 'conditional'은 동종 여부로 갈림.
const TEMPERAMENT_MATRIX = {
  peaceful:        {peaceful:'ok',      'semi-aggressive':'caution', aggressive:'bad'},
  'semi-aggressive':{peaceful:'caution', 'semi-aggressive':'caution', aggressive:'bad'},
  aggressive:       {peaceful:'bad',     'semi-aggressive':'bad',    aggressive:'conditional'},
};
const VERDICT_SEV = {ok:0, caution:1, bad:2};

// 예외 테이블 — 규칙만으로 못 잡는, 실제 사육 사례 기반의 알려진 예외
const SPECIES_PAIR_OVERRIDES = [
  { a:'betta', b:'corydoras', result:'caution',
    reason:'베타는 하층에서 조용히 지내는 코리도라스는 대체로 무시하는 편이라 실제로 널리 쓰이는 조합입니다. 다만 베타 개체 성격 차이가 커서 완전히 안전하다고 보긴 어렵습니다.',
    source:'커뮤니티 관찰' },
  { a:'red-belly-piranha-sp', b:'silver-dollar', result:'caution',
    reason:'피라냐와 실버달러는 남미에서 실제로 서식지를 공유하는 조합으로, 실버달러의 빠른 유영 속도 덕분에 충분히 큰 수조에서는 종종 함께 사육됩니다. 그래도 위험이 완전히 없는 건 아니라 대형 수조와 충분한 무리가 전제됩니다.',
    source:'도감/커뮤니티' },
];

function findOverride(sA, sB){
  return SPECIES_PAIR_OVERRIDES.find(o =>
    (o.a===sA.id && o.b===sB.id) || (o.a===sB.id && o.b===sA.id)
  );
}

function dietCategory(diet){
  if(diet.includes('초식')) return 'herbivore';
  if(diet.includes('육식')) return 'carnivore';
  return 'omnivore';
}

// 단계적 다운그레이드 유틸: severity를 최대 1단계씩만 올리고 이유를 기록
function makeDowngrader(state){
  return (text) => {
    state.severity = Math.min(2, state.severity + 1);
    state.reasons.push({sev:1, text});
  };
}

function computeCompat(sA, sB){
  const fA = getSpec(sA), fB = getSpec(sB);
  const state = {severity:0, reasons:[]};
  const downgrade = makeDowngrader(state);

  if(sA.id === sB.id){
    state.reasons.push({sev:0, text: fA.schooling.need
      ? `같은 종입니다. 무리 사육이 필요한 종이라 최소 ${fA.schooling.minGroup}마리 이상 함께 키우는 걸 권장합니다.`
      : `같은 종입니다. 단독 사육도 가능한 종입니다.`});
    return {severity:0, reasons:state.reasons, tempOverlap: fA.temp, phOverlap: fA.ph, tankMin: fA.tankMin};
  }

  // ---- 1단계: 하드 블로커 (수온/pH 겹침 — 숫자라서 계산 가능한 영역) ----
  const tempOv = overlapRange(fA.temp, fB.temp);
  if(!tempOv){
    state.severity = 2;
    state.reasons.push({sev:2, text:`수온 범위가 겹치지 않습니다 (${fA.temp[0]}~${fA.temp[1]}°C vs ${fB.temp[0]}~${fB.temp[1]}°C). 두 종을 동시에 만족시키는 온도를 만들 수 없습니다.`});
  } else if(tempOv[1]-tempOv[0] < 1.5){
    state.severity = Math.max(state.severity, 1);
    state.reasons.push({sev:1, text:`수온이 겹치긴 하지만 공통 구간이 좁습니다 (공통: ${tempOv[0]}~${tempOv[1]}°C). 온도 유지에 신경 써야 합니다.`});
  } else {
    state.reasons.push({sev:0, text:`수온 범위가 잘 겹칩니다 (공통: ${tempOv[0]}~${tempOv[1]}°C).`});
  }

  const phOv = overlapRange(fA.ph, fB.ph);
  if(!phOv){
    state.severity = 2;
    state.reasons.push({sev:2, text:`pH 범위가 겹치지 않습니다 (${fA.ph[0]}~${fA.ph[1]} vs ${fB.ph[0]}~${fB.ph[1]}). 두 종에게 동시에 맞는 수질을 유지하기 어렵습니다.`});
  } else if(phOv[1]-phOv[0] < 0.3){
    state.severity = Math.max(state.severity, 1);
    state.reasons.push({sev:1, text:`pH가 겹치긴 하지만 공통 구간이 좁습니다 (공통: ${phOv[0].toFixed(1)}~${phOv[1].toFixed(1)}).`});
  } else {
    state.reasons.push({sev:0, text:`pH 범위가 잘 겹칩니다 (공통: ${phOv[0].toFixed(1)}~${phOv[1].toFixed(1)}).`});
  }

  // ---- 2단계: 성격 매트릭스 (정성 데이터는 카테고리 교차표로만 처리) ----
  const bigMax = Math.max(sA.maxSize, sB.maxSize);
  const smallMax = Math.min(sA.maxSize, sB.maxSize);
  const sizeRatio = bigMax/smallMax;

  let tVerdict = TEMPERAMENT_MATRIX[fA.temperament][fB.temperament];
  if(tVerdict === 'conditional'){
    tVerdict = (sA.groupId === sB.groupId) ? 'caution' : 'bad';
    state.reasons.push({sev: VERDICT_SEV[tVerdict], text: tVerdict==='caution'
      ? `둘 다 공격적인 성향이지만 같은 케어그룹(비슷한 생태)이라 무리 사육 형태로는 가능할 수 있습니다.`
      : `둘 다 공격적인 성향이고 생태가 달라 서로 충돌할 가능성이 큽니다.`});
  } else if(tVerdict === 'bad' && sizeRatio < 1.8){
    // '*' 조건: 크기가 비슷하면 완화
    tVerdict = 'caution';
    state.reasons.push({sev:1, text:`성격 조합상으로는 위험하지만(${temperamentLabel(fA.temperament)} vs ${temperamentLabel(fB.temperament)}), 크기가 비슷해(${bigMax}cm vs ${smallMax}cm) 위험도가 다소 낮아집니다.`});
  } else {
    const labelMap = {ok:'좋은 궁합입니다.', caution:'차이가 있어 은신처를 넉넉히 두는 게 안전합니다.', bad:'한쪽이 다른 쪽을 괴롭히거나 공격할 위험이 큽니다.'};
    state.reasons.push({sev: VERDICT_SEV[tVerdict], text:`성격: ${temperamentLabel(fA.temperament)} vs ${temperamentLabel(fB.temperament)} — ${labelMap[tVerdict]}`});
  }
  state.severity = Math.max(state.severity, VERDICT_SEV[tVerdict]);

  // 크기 차이에 따른 포식 위험 (매트릭스와 별개로, 온순한 조합이어도 크기 차가 크면 위험)
  if(sizeRatio >= 4){
    state.severity = Math.max(state.severity, 2);
    state.reasons.push({sev:2, text:`크기 차이가 매우 큽니다 (${bigMax}cm vs ${smallMax}cm). 성격과 무관하게 큰 종이 작은 종을 먹이로 인식할 위험이 있습니다.`});
  } else if(sizeRatio >= 2.5 && tVerdict==='ok'){
    downgrade(`크기 차이가 있는 편입니다 (${bigMax}cm vs ${smallMax}cm). 작은 개체가 스트레스를 받을 수 있어 관찰이 필요합니다.`);
  }

  // ---- 3단계: 보조 리스크 요인 (등급을 한 단계씩만 낮추는 규칙) ----
  const predatorSpecies = fA.predatory ? sA : (fB.predatory ? sB : null);
  const preySpecies = predatorSpecies === sA ? sB : sA;
  if(predatorSpecies && preySpecies.maxSize * 2.5 <= predatorSpecies.maxSize){
    state.severity = 2;
    state.reasons.push({sev:2, text:`[${predatorSpecies.name}]은(는) 입에 들어가는 크기의 물고기를 먹이로 인식하는 습성이 있어, 몸집이 작은 [${preySpecies.name}]은(는) 잡아먹힐 위험이 있습니다.`});
  } else if(predatorSpecies){
    downgrade(`[${predatorSpecies.name}]은(는) 포식성 습성이 있는 종입니다. 크기가 비슷해도 관찰이 필요합니다.`);
  }

  if(fA.finNipper || fB.finNipper){
    const nipper = fA.finNipper ? sA : sB;
    downgrade(`[${nipper.name}]은(는) 지느러미를 무는 습성이 있어, 베타나 구라미처럼 지느러미가 화려하고 긴 어종과는 합사에 주의가 필요합니다.`);
  }

  if(fA.territorial && fB.territorial){
    downgrade(`두 종 다 영역성이 있어 은신처와 시야를 가릴 수 있는 구조물을 넉넉히 배치하는 게 안전합니다.`);
  }

  // 같은 수층 + 같은 식성 카테고리 = 니치 경쟁
  if(fA.waterLevel === fB.waterLevel && dietCategory(fA.diet) === dietCategory(fB.diet)){
    downgrade(`두 종이 같은 수층(${fA.waterLevel})에서 비슷한 먹이를 두고 경쟁할 수 있습니다. 급여 시 양쪽에 먹이가 고루 돌아가는지 확인하세요.`);
  }

  // 수질 예민도 — 예민한 종이 거친 tankmate나 큰 바이오로드에 노출되는 경우
  const sensitiveSpecies = fA.waterSensitivity==='high' ? sA : (fB.waterSensitivity==='high' ? sB : null);
  if(sensitiveSpecies){
    const other = sensitiveSpecies===sA ? fB : fA;
    const otherSp = sensitiveSpecies===sA ? sB : sA;
    if(other.temperament!=='peaceful' || otherSp.maxSize >= 30){
      downgrade(`[${sensitiveSpecies.name}]은(는) 수질 변화에 예민한 종입니다. 거칠거나 몸집이 큰 [${otherSp.name}]과 함께 두면 스트레스를 받기 쉬워 수조가 충분히 안정된 뒤 입식하는 걸 권장합니다.`);
    } else {
      state.reasons.push({sev:0, text:`[${sensitiveSpecies.name}]은(는) 수질 변화에 예민한 종이니, 어떤 조합이든 수조가 충분히 안정된 뒤에 입식하세요.`});
    }
  }

  // 정보성 참고사항 (등급에는 영향 없음 — 실제 마리 수를 모르기 때문)
  if(fA.sameSpeciesAggressionOnly && fB.sameSpeciesAggressionOnly && sA.groupId === sB.groupId){
    state.reasons.push({sev:0, text:`두 종 모두 동종끼리 공격성이 강해지는 습성이 있습니다. 수컷 수 조절이 중요합니다.`});
  }
  if(fA.breedingAggressionOnly || fB.breedingAggressionOnly){
    const breeder = fA.breedingAggressionOnly ? sA : sB;
    state.reasons.push({sev:0, text:`[${breeder.name}]은(는) 평상시엔 문제없지만 번식기/산란기에는 일시적으로 공격성이 크게 올라갈 수 있습니다.`});
  }
  if(fA.schooling.need || fB.schooling.need){
    const schooler = fA.schooling.need ? sA : sB;
    const need = fA.schooling.need ? fA.schooling.minGroup : fB.schooling.minGroup;
    state.reasons.push({sev:0, text:`[${schooler.name}]은(는) 무리 사육이 필요한 종입니다 (최소 ${need}마리). 마리 수가 부족하면 스트레스로 공격성이 오히려 올라갈 수 있어요.`});
  }

  const brackishGroups = ['puffer-brackish','brackish-shark-catfish'];
  if(brackishGroups.includes(sA.groupId) || brackishGroups.includes(sB.groupId)){
    downgrade(`한쪽은 성장하면서 기수(약간의 염분)가 필요해지는 종입니다. 완전 담수 전용종과는 장기적으로 합사가 어려울 수 있습니다.`);
  }
  if(sA.groupId === 'piranha' || sB.groupId === 'piranha'){
    state.severity = 2;
    state.reasons.push({sev:2, text:`피라냐는 원칙적으로 동종 무리 외에는 다른 어종과 합사가 거의 불가능합니다.`});
  }
  if(sA.groupId === 'pacu' || sB.groupId === 'pacu'){
    downgrade(`파쿠는 성장하면 90cm 가까이 자라는 대형 초식어라, 결국 수조 크기 문제로 대부분의 소형 어종과 합사가 어려워집니다.`);
  }
  if(sA.note) state.reasons.push({sev:1, text:`[${sA.name}] ${sA.note}`});
  if(sB.note) state.reasons.push({sev:1, text:`[${sB.name}] ${sB.note}`});

  // ---- 예외 테이블 — 규칙 기반 결론을 실제 사례로 덮어씀 ----
  const override = findOverride(sA, sB);
  if(override){
    state.severity = VERDICT_SEV[override.result];
    state.reasons.unshift({sev: VERDICT_SEV[override.result], text:`[알려진 예외 사례 · 출처: ${override.source}] ${override.reason}`});
  }

  return {severity: state.severity, reasons: state.reasons, tempOverlap: tempOv, phOverlap: phOv, tankMin: Math.max(fA.tankMin, fB.tankMin)};
}

function renderDualBar(rangeA, rangeB, overlap, min, max, colorA, colorB){
  const pct = (v)=> ((v-min)/(max-min))*100;
  const aLeft = pct(rangeA[0]), aWidth = pct(rangeA[1])-pct(rangeA[0]);
  const bLeft = pct(rangeB[0]), bWidth = pct(rangeB[1])-pct(rangeB[0]);
  const ovLeft = overlap ? pct(overlap[0]) : 0;
  const ovWidth = overlap ? pct(overlap[1])-pct(overlap[0]) : 0;
  return `
  <div class="dual-track">
    <div class="overlap-zone ${overlap?'':'none'}" style="left:${ovLeft}%;width:${ovWidth}%"></div>
    <div class="dual-fill a" style="left:${aLeft}%;width:${aWidth}%;background:${colorA}"></div>
    <div class="dual-fill b" style="left:${bLeft}%;width:${bWidth}%;background:${colorB}"></div>
  </div>`;
}

      <div class="compat-fish-card">${fishIcon(fA.color)}<div><h4>${nameA}</h4><div class="latin">${sA.latin}</div></div></div>
      <div class="compat-fish-card">${fishIcon(fB.color)}<div><h4>${nameB}</h4><div class="latin">${sB.latin}</div></div></div>

      </div>
    </div>

    <div class="dual-range-row">
      <div class="dual-range-head"><span>pH</span><span>${fA.ph[0]}~${fA.ph[1]} vs ${fB.ph[0]}~${fB.ph[1]}</span></div>
      ${renderDualBar(fA.ph, fB.ph, compat.phOverlap, COMPAT_PH_RANGE[0], COMPAT_PH_RANGE[1], fA.color, fB.color)}
    </div>

    <div class="spec-label" style="margin:24px 0 10px;">${currentLang==='ko'?'체크 결과':'Check results'}${currentLang==='en' ? ' <span style="font-weight:400;color:var(--muted);font-size:11px;">(reasons shown in Korean)</span>' : ''}</div>
    <ul class="reason-list">
      ${compat.reasons.map(r=>`<li class="reason-item ${r.sev===0?'ok':r.sev===1?'caution':'bad'}"><span class="reason-mark">${r.sev===0?'✓':r.sev===1?'!':'✕'}</span><span>${r.text}</span></li>`).join('')}
    </ul>

    <div class="spec-label" style="margin:24px 0 10px;">${t('recommendedTank')}</div>
    <div class="tips">${currentLang==='ko'
      ? `두 어종 중 더 큰 요구치를 기준으로 <b>${compat.tankMin}L 이상</b>을 권장합니다. 실제로는 마리 수와 여과 능력에 따라 더 커져야 할 수 있습니다.`
      : `Based on the larger of the two species' requirements, we recommend at least <b>${compat.tankMin}L</b>. The actual number may need to be higher depending on stocking count and filtration.`}</div>
  `;

// ---------------------------------------------------------------
// 어항 구성 체크 (3종 이상 한번에) — 기존 2종 비교 엔진을 재사용해서
// 모든 종 쌍(pair)을 다 비교하고, 그중 가장 심각한 결과를 대표값으로 씀
// ---------------------------------------------------------------
function buildTankPanelHTML(){
  return `
  <p class="sub" style="margin-bottom:24px;">${t('tankCheckSub')}</p>
  <div class="tank-add-row">
    <input type="text" id="tankAddInput" autocomplete="off" placeholder="${t('addSpeciesPlaceholder')}" />
    <div class="suggest-list" id="tankAddSuggest"></div>
  </div>
  <div class="tank-chips" id="tankChips"></div>
  <button class="compat-btn" id="tankCheckBtn">${t('tankCheckBtn')}</button>
  <div id="tankResult" style="margin-top:24px;"></div>
`;
}

let tankSpecies = [];

function renderTankChips(){
  const wrap = document.getElementById('tankChips');
  wrap.innerHTML = tankSpecies.map(s=>`
    <div class="tank-chip">
      <span>${displayLabel(s)}</span>
      <button data-id="${s.id}" aria-label="remove">×</button>
    </div>`).join('');
  wrap.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      tankSpecies = tankSpecies.filter(s=>s.id !== btn.dataset.id);
      renderTankChips();
    });
  });
}

function initTankPanel(){
  document.getElementById('tankPanelWrap').innerHTML = buildTankPanelHTML();
  renderTankChips();
  attachAutocomplete('tankAddInput', 'tankAddSuggest', (s)=>{
    if(!tankSpecies.find(x=>x.id===s.id)){
      tankSpecies.push(s);
      renderTankChips();
    }
    document.getElementById('tankAddInput').value = '';
  }, ()=>{});
  document.getElementById('tankCheckBtn').addEventListener('click', renderTankResult);
}

function computeTankCheck(list){
  const pairs = [];
  for(let i=0;i<list.length;i++){
    for(let j=i+1;j<list.length;j++){
      pairs.push({a:list[i], b:list[j], result: computeCompat(list[i], list[j])});
    }
  }
  const worst = pairs.length ? Math.max(...pairs.map(p=>p.result.severity)) : 0;

  let combinedTemp = getSpec(list[0]).temp;
  let combinedPh = getSpec(list[0]).ph;
  list.slice(1).forEach(s=>{
    const f = getSpec(s);
    combinedTemp = combinedTemp ? overlapRange(combinedTemp, f.temp) : null;
    combinedPh = combinedPh ? overlapRange(combinedPh, f.ph) : null;
  });

  const recommendedTank = Math.max(...list.map(s=>getSpec(s).tankMin));
  return {pairs, worst, combinedTemp, combinedPh, recommendedTank};
}

function renderTankResult(){
  const result = document.getElementById('tankResult');
  if(tankSpecies.length < 2){
    result.innerHTML = `<div class="compat-empty">${t('needTwoSpecies')}</div>`;
    return;
  }
  const check = computeTankCheck(tankSpecies);
  const verdictMap = {
    0:{cls:'ok', icon:'✓', title:t('tankVerdictOkTitle'), sub:t('tankVerdictOkSub')},
    1:{cls:'caution', icon:'!', title:t('tankVerdictCautionTitle'), sub:t('tankVerdictCautionSub')},
    2:{cls:'bad', icon:'✕', title:t('tankVerdictBadTitle'), sub:t('tankVerdictBadSub')},
  };
  const v = verdictMap[check.worst];

  const tempText = check.combinedTemp ? `${check.combinedTemp[0]}~${check.combinedTemp[1]}°C` : t('noOverlap');
  const phText = check.combinedPh ? `${check.combinedPh[0].toFixed(1)}~${check.combinedPh[1].toFixed(1)}` : t('noOverlap');

  const pairRows = check.pairs
    .slice()
    .sort((a,b)=> b.result.severity - a.result.severity)
    .map(p=>{
      const sevCls = p.result.severity===0?'ok':p.result.severity===1?'caution':'bad';
      const mark = p.result.severity===0?'✓':p.result.severity===1?'!':'✕';
      const notableReasons = p.result.reasons.filter(r=>r.sev>=1).map(r=>r.text);
      return `
      <div class="pair-row ${sevCls}">
        <div class="pair-mark">${mark}</div>
        <div style="flex:1;">
          <div class="pair-names">${speciesDisplayName(p.a)} × ${speciesDisplayName(p.b)}</div>
          ${notableReasons.length ? `<div class="pair-reasons">${notableReasons.join(' · ')}</div>` : `<div class="pair-reasons">${t('noNotable')}</div>`}
        </div>
      </div>`;
    }).join('');

  result.innerHTML = `
    <div class="verdict-banner ${v.cls}">
      <div class="verdict-icon">${v.icon}</div>
      <div>
        <div class="verdict-title">${v.title}</div>
        <div class="verdict-sub">${v.sub}</div>
      </div>
    </div>

    <div class="facts" style="margin-bottom:24px;">
      <div><div class="fact-label">${t('commonTemp')}</div><div class="fact-val">${tempText}</div></div>
      <div><div class="fact-label">${t('commonPh')}</div><div class="fact-val">${phText}</div></div>
      <div><div class="fact-label">${t('recommendedTank')}</div><div class="fact-val">${check.recommendedTank}L${currentLang==='ko'?' 이상':'+'}</div></div>
      <div><div class="fact-label">${t('comparedPairs')}</div><div class="fact-val">${t('pairsUnit', check.pairs.length, tankSpecies.length)}</div></div>
    </div>

    <div class="spec-label" style="margin-bottom:10px;">${t('pairDetailLabel')}</div>
    ${pairRows}
  `;
}

// ---------------------------------------------------------------
// 내 어항 (My Tank) — localStorage 기반 CRUD.
// 데이터 구조는 나중에 Supabase 테이블로 그대로 옮길 수 있게 설계함:
//   tanks(id, name, lengthCm, widthCm, heightCm, volumeL)
//   water_log(id, tank_id, date, temp, note, ph, ammonia, nitrite, nitrate)
//   reminders(id, tank_id, label, interval_days, last_done)
//   tank_species(tank_id, species_id, count)  <- species 배열이 이 역할
// 길이/부피는 항상 cm·L(미터법)로 저장하고, 표시할 때만 단위 설정에 맞춰 변환함.
// ---------------------------------------------------------------
const MYTANK_KEY = 'fishAppMyTanks_v1';
const UNIT_KEY = 'fishAppUnitPref_v1';
const WATERFIELDS_KEY = 'fishAppWaterFields_v1';
const CM_PER_INCH = 2.54;
const L_PER_GAL = 3.78541;

const OPTIONAL_WATER_FIELDS = [
  {key:'ph', label:'pH', step:'0.1'},
  {key:'ammonia', label:'암모니아(ppm)', step:'0.01'},
  {key:'nitrite', label:'아질산(ppm)', step:'0.01'},
  {key:'nitrate', label:'질산염(ppm)', step:'1'},
];

let currentUnit = localStorage.getItem(UNIT_KEY) || 'metric';
function saveUnit(u){ currentUnit = u; localStorage.setItem(UNIT_KEY, u); }
function lenUnitLabel(){ return currentUnit==='metric' ? 'cm' : 'in'; }
function volUnitLabel(){ return currentUnit==='metric' ? 'L' : 'gal'; }
function round1(v){ return Math.round(v*10)/10; }
function cmToDisplay(cm){ return currentUnit==='metric' ? cm : round1(cm/CM_PER_INCH); }
function displayToCm(v){ return currentUnit==='metric' ? v : v*CM_PER_INCH; }
function litersToDisplay(l){ return currentUnit==='metric' ? l : round1(l/L_PER_GAL); }
function fmtLen(cm){ return `${round1(cmToDisplay(cm))}${lenUnitLabel()}`; }
function fmtVol(l){ return `${litersToDisplay(l)}${volUnitLabel()}`; }

function loadEnabledWaterFields(){
  try { return JSON.parse(localStorage.getItem(WATERFIELDS_KEY)) || []; }
  catch(e){ return []; }
}
function saveEnabledWaterFields(arr){ localStorage.setItem(WATERFIELDS_KEY, JSON.stringify(arr)); }
let enabledWaterFields = loadEnabledWaterFields();

function loadTanks(){
  let tanks;
  try { tanks = JSON.parse(localStorage.getItem(MYTANK_KEY)) || []; }
  catch(e){ tanks = []; }
  let changed = false;
  tanks.forEach(t=>{
    if(!t.species && t.speciesIds){
      t.species = t.speciesIds.map(id=>({id, count:1}));
      delete t.speciesIds;
      changed = true;
    }
    if(!t.species) t.species = [];
  });
  if(changed) saveTanks(tanks);
  return tanks;
}
function saveTanks(tanks){ localStorage.setItem(MYTANK_KEY, JSON.stringify(tanks)); }
function updateTank(id, mutator){
  const tanks = loadTanks();
  const t = tanks.find(x=>x.id===id);
  if(t){ mutator(t); saveTanks(tanks); }
}
function uid(){ return 'id_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDaysStr(dateStr, days){
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function parseFloatOrNull(v){ const n = parseFloat(v); return isNaN(n) ? null : n; }
function reminderStatus(r){
  const next = addDaysStr(r.lastDone, r.intervalDays);
  const today = todayStr();
  if(next < today) return 'overdue';
  if(next === today) return 'due-today';
  return 'ok';
}

let currentMyTankView = {mode:'list'};

function renderMyTankList(){ currentMyTankView = {mode:'list'}; renderMyTankPanel(); }

function unitSelectHTML(id){
  return `<select id="${id}" class="tank-filter" style="width:auto;">
    <option value="metric" ${currentUnit==='metric'?'selected':''}>cm / L</option>
    <option value="imperial" ${currentUnit==='imperial'?'selected':''}>inch / gal</option>
  </select>`;
}

function tankCardHTML(tk){
  const overdueCount = (tk.reminders||[]).filter(r=>reminderStatus(r)!=='ok').length;
  const totalCount = (tk.species||[]).reduce((sum,s)=>sum+(s.count||1), 0);
  return `<div class="tank-card" data-id="${tk.id}">
    <div class="liter-badge">${fmtVol(tk.volumeL)}</div>
    <h3>${tk.name}</h3>
    <div class="tank-meta">${fmtLen(tk.lengthCm)}×${fmtLen(tk.widthCm)}×${fmtLen(tk.heightCm)} · ${(tk.species||[]).length}${currentLang==='ko'?'종':' species'} · ${totalCount}${currentLang==='ko'?'마리':' total'}</div>
    ${overdueCount ? `<div class="due-badge">${currentLang==='ko'?`할 일 ${overdueCount}건`:`${overdueCount} due`}</div>` : ''}
  </div>`;
}

function renderMyTankPanel(){
  const wrap = document.getElementById('myTankPanelWrap');
  const view = currentMyTankView;

  if(view.mode === 'list'){
    const tanks = loadTanks();
    wrap.innerHTML = `
      <div class="mytank-toolbar">
        <p class="sub" style="margin:0;">${t('myTankSub')}</p>
        <div style="display:flex;gap:10px;align-items:center;">
          ${unitSelectHTML('unitSelectGlobal')}
          <button class="compat-btn" id="addTankBtn">${t('addTankBtn')}</button>
        </div>
      </div>
      ${tanks.length ? `<div class="tank-grid">${tanks.map(tankCardHTML).join('')}</div>`
        : `<div class="compat-empty">${t('noTanksYet')}</div>`}
    `;
    document.getElementById('unitSelectGlobal').addEventListener('change', (e)=>{
      saveUnit(e.target.value);
      renderMyTankPanel();
    });
    document.getElementById('addTankBtn').addEventListener('click', ()=>{
      currentMyTankView = {mode:'form'};
      renderMyTankPanel();
    });
    wrap.querySelectorAll('.tank-card').forEach(el=>{
      el.addEventListener('click', ()=>{
        currentMyTankView = {mode:'detail', id: el.dataset.id, subtab:'stocking'};
        renderMyTankPanel();
      });
    });

  } else if(view.mode === 'form'){
    renderTankFormView(wrap, view.editId);

  } else if(view.mode === 'detail'){
    renderTankDetailView(wrap, view.id, view.subtab);
  }
}

    <div class="spec-label" style="margin-bottom:16px;">${existing ? t('editTank') : t('addTank')}</div>

    <div class="form-row"><label>${t('unitLabel')}</label>${unitSelectHTML('unitSelect')}</div>
    <div class="form-inline">
      <div class="form-row"><label id="lenLabel">${t('lenLabel', lenUnitLabel())}</label><input type="number" id="tankLenInput" /></div>
      <div class="form-row"><label id="widLabel">${t('widLabel', lenUnitLabel())}</label><input type="number" id="tankWidInput" /></div>

    <div class="form-row" style="position:relative;">
      <label>${t('addSpeciesLabel')}</label>
      <input type="text" id="tankFormAddInput" autocomplete="off" placeholder="${t('speciesSearchPlaceholder')}" />

    <div id="deleteArea" style="margin-top:20px;">

      ${existing ? `<button class="btn-small danger" id="deleteTankBtn" style="margin-left:10px;">${t('deleteBtn')}</button>` : ''}
    </div>
  `;

  function refreshDims(){
    document.getElementById('tankLenInput').value = round1(cmToDisplay(lenCm)) || '';
    document.getElementById('tankWidInput').value = round1(cmToDisplay(widCm)) || '';
    document.getElementById('tankHeiInput').value = round1(cmToDisplay(heiCm)) || '';
    document.getElementById('lenLabel').textContent = t('lenLabel', lenUnitLabel());
    document.getElementById('widLabel').textContent = t('widLabel', lenUnitLabel());
    document.getElementById('heiLabel').textContent = t('heiLabel', lenUnitLabel());
    updateVolume();
  }
  function updateVolume(){
    const liters = Math.round((lenCm*widCm*heiCm)/1000);
    document.getElementById('volumePreview').textContent = `${litersToDisplay(liters)} ${volUnitLabel()}`;
  }
  document.getElementById('tankLenInput').addEventListener('input', (e)=>{ lenCm = displayToCm(parseFloat(e.target.value)||0); updateVolume(); });
  document.getElementById('tankWidInput').addEventListener('input', (e)=>{ widCm = displayToCm(parseFloat(e.target.value)||0); updateVolume(); });
  document.getElementById('tankHeiInput').addEventListener('input', (e)=>{ heiCm = displayToCm(parseFloat(e.target.value)||0); updateVolume(); });
  document.getElementById('unitSelect').addEventListener('change', (e)=>{
    saveUnit(e.target.value);
    refreshDims();
  });
  refreshDims();

  function renderChips(){
    document.getElementById('tankFormChips').innerHTML = formSpecies.map(fs=>{
      const s = speciesList.find(x=>x.id===fs.id);
      if(!s) return '';
      return `<div class="tank-chip">
        <span>${displayLabel(s)}</span>
        <input type="number" class="chip-count-input" min="1" value="${fs.count}" data-id="${fs.id}"

        ${currentLang==='ko' ? `<span style="font-size:11px;color:var(--muted);">${t('unitCount')}</span>` : ''}
        <button data-id="${fs.id}">×</button>
      </div>`;
    }).join('');
    document.querySelectorAll('#tankFormChips .chip-count-input').forEach(inp=>{
      inp.addEventListener('input', ()=>{
        const fs = formSpecies.find(x=>x.id===inp.dataset.id);

  renderChips();

          <button class="btn-small danger" id="confirmDeleteBtn">${t('confirmDeleteYes')}</button>
          <button class="btn-small" id="cancelDeleteBtn">${t('cancelBtn')}</button>
        </div>
      `;
      document.getElementById('confirmDeleteBtn').addEventListener('click', ()=>{
        saveTanks(loadTanks().filter(tk=>tk.id!==existing.id));
        currentMyTankView = {mode:'list'};
        renderMyTankPanel();
      });
      document.getElementById('cancelDeleteBtn').addEventListener('click', ()=>{
        currentMyTankView = {mode:'form', editId: existing.id};
        renderMyTankPanel();
      });
    });
  }
}

function renderStockingSub(content, tank){
  const species = (tank.species||[]).map(fs=>{
    const s = speciesList.find(x=>x.id===fs.id);
    return s ? Object.assign({}, s, {count: fs.count}) : null;
  }).filter(Boolean);

  if(species.length === 0){
    content.innerHTML = `<div class="compat-empty">${t('noSpeciesRegistered')}</div>`;
    return;
  }
  const totalCount = species.reduce((sum,s)=>sum+(s.count||1), 0);
  const recommendedTank = Math.max(...species.map(s=>getSpec(s).tankMin));
  const utilization = Math.min(100, Math.round((tank.volumeL / recommendedTank) * 100));
  const barColor = tank.volumeL >= recommendedTank ? 'var(--teal)' : 'var(--danger)';

  let pairHTML = '';
  if(species.length >= 2){
    const check = computeTankCheck(species);
    pairHTML = check.pairs.slice().sort((a,b)=>b.result.severity-a.result.severity).map(p=>{
      const sevCls = p.result.severity===0?'ok':p.result.severity===1?'caution':'bad';
      const mark = p.result.severity===0?'✓':p.result.severity===1?'!':'✕';
      return `<div class="pair-row ${sevCls}"><div class="pair-mark">${mark}</div><div class="pair-names">${speciesDisplayName(p.a)} × ${speciesDisplayName(p.b)}</div></div>`;
    }).join('');
  }

  content.innerHTML = `
    <div class="facts" style="margin-bottom:16px;">
      <div><div class="fact-label">${t('currentVolume')}</div><div class="fact-val">${fmtVol(tank.volumeL)}</div></div>
      <div><div class="fact-label">${t('recommendedMin')}</div><div class="fact-val">${fmtVol(recommendedTank)}</div></div>
      <div><div class="fact-label">${t('totalCount')}</div><div class="fact-val">${totalCount}${currentLang==='ko'?'마리':''}</div></div>
    </div>
    <div class="stock-bar-track"><div class="stock-bar-fill" style="width:${utilization}%;background:${barColor};"></div></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px;">
      ${tank.volumeL >= recommendedTank ? t('sufficientVolume') : t('shortVolume', fmtVol(recommendedTank - tank.volumeL))}
    </div>
    <div class="spec-label" style="margin-bottom:10px;">${t('registeredSpecies', species.length, totalCount)}</div>
    <div class="tank-chips" style="margin-bottom:20px;">${species.map(s=>`<div class="tank-chip"><span>${displayLabel(s)} ×${s.count}</span></div>`).join('')}</div>
    ${species.length >= 2 ? `<div class="spec-label" style="margin-bottom:10px;">${t('pairCompat')}</div>${pairHTML}` : ''}
  `;
}

function renderLineChart(log){
  const w=600, h=160, pad=30;
  const xs = log.map((_,i)=> pad + i*((w-2*pad)/Math.max(1, log.length-1)));
  function scaleY(vals, min, max){
    return vals.map(v => v==null ? null : h-pad - ((v-min)/((max-min)||1))*(h-2*pad));
  }
  const temps = log.map(p=>p.temp), phs = log.map(p=>p.ph);
  const vt = temps.filter(v=>v!=null), vp = phs.filter(v=>v!=null);
  const tMin = vt.length ? Math.min(...vt)-1 : 20, tMax = vt.length ? Math.max(...vt)+1 : 30;
  const pMin = vp.length ? Math.min(...vp)-0.3 : 6, pMax = vp.length ? Math.max(...vp)+0.3 : 8;
  const tY = scaleY(temps, tMin, tMax), pY = scaleY(phs, pMin, pMax);
  function pathFor(ys){
    let d='', started=false;
    ys.forEach((y,i)=>{ if(y==null) return; d += (started?'L':'M') + xs[i] + ',' + y + ' '; started = true; });
    return d;
  }
  const showPh = vp.length > 0;
  return `<div class="chart-wrap">
    <div class="chart-legend">
      <span><span class="legend-dot" style="background:var(--teal)"></span>${t('tempLabel')}</span>
      ${showPh ? `<span><span class="legend-dot" style="background:var(--amber)"></span>pH</span>` : ''}
    </div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">
      <path d="${pathFor(tY)}" fill="none" stroke="var(--teal)" stroke-width="2"/>
      ${showPh ? `<path d="${pathFor(pY)}" fill="none" stroke="var(--amber)" stroke-width="2"/>` : ''}
    </svg>
  </div>`;
}

function renderWaterLogSub(content, tank){
  const log = (tank.waterLog||[]).slice().sort((a,b)=> a.date.localeCompare(b.date));
  const hiddenFields = OPTIONAL_WATER_FIELDS.filter(f=>!enabledWaterFields.includes(f.key));

    <div class="form-inline">

    </div>
    <div class="form-row"><label>${t('noteLabel')}</label><input type="text" id="logNote" placeholder="${t('notePlaceholder')}" /></div>
    ${enabledWaterFields.length ? `<div class="form-inline">${enabledWaterFields.map(k=>{
        const f = OPTIONAL_WATER_FIELDS.find(x=>x.key===k);
        return `<div class="form-row">
          <label>${f.label} <button class="btn-small danger" data-remove-field="${f.key}" style="padding:1px 7px;margin-left:4px;font-size:11px;">${t('deleteBtn')}</button></label>

    ${hiddenFields.length ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
      ${hiddenFields.map(f=>`<button class="btn-small" data-add-field="${f.key}">+ ${f.label}</button>`).join('')}
    </div>` : ''}
    <button class="compat-btn" id="addLogBtn">${t('addLogBtn')}</button>
    ${log.length ? renderLineChart(log) : ''}
    ${log.length ? renderLogTable(log) : `<div class="compat-empty">${t('noLogsYet')}</div>`}
  `;

  content.querySelectorAll('[data-remove-field]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault();
      enabledWaterFields = enabledWaterFields.filter(k=>k!==btn.dataset.removeField);
      saveEnabledWaterFields(enabledWaterFields);
      renderWaterLogSub(content, tank);
    });
  });

  content.querySelectorAll('[data-add-field]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      enabledWaterFields.push(btn.dataset.addField);
      saveEnabledWaterFields(enabledWaterFields);
      renderWaterLogSub(content, tank);
    });
  });

  document.getElementById('addLogBtn').addEventListener('click', ()=>{
    const entry = {
      id: uid(),
      date: document.getElementById('logDate').value || todayStr(),
      temp: parseFloatOrNull(document.getElementById('logTemp').value),
      note: document.getElementById('logNote').value.trim() || null,
    };
    OPTIONAL_WATER_FIELDS.forEach(f=>{
      const el = document.getElementById('log_'+f.key);
      entry[f.key] = el ? parseFloatOrNull(el.value) : null;
    });
    updateTank(tank.id, tk=>{ tk.waterLog = tk.waterLog || []; tk.waterLog.push(entry); });
    currentMyTankView = {mode:'detail', id: tank.id, subtab:'waterlog'};
    renderMyTankPanel();
  });
  content.querySelectorAll('[data-log-id]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      updateTank(tank.id, tk=>{ tk.waterLog = (tk.waterLog||[]).filter(e=>e.id!==btn.dataset.logId); });
      currentMyTankView = {mode:'detail', id: tank.id, subtab:'waterlog'};
      renderMyTankPanel();
    });
  });
}

function renderLogTable(log){
  const extraFields = OPTIONAL_WATER_FIELDS.filter(f => enabledWaterFields.includes(f.key) || log.some(e=>e[f.key]!=null));
  const headers = [t('dateLabel'), t('tempLabel'), t('noteLabel'), ...extraFields.map(f=>f.label), ''];
  return `<table class="log-table">
    <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${log.slice().reverse().map(e=>`<tr>
      <td>${e.date}</td><td>${e.temp??'-'}</td><td>${e.note??'-'}</td>
      ${extraFields.map(f=>`<td>${e[f.key]??'-'}</td>`).join('')}
      <td><button class="btn-small danger" data-log-id="${e.id}">${t('deleteBtn')}</button></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function reminderRowHTML(r){
  const status = reminderStatus(r);
  const nextDue = addDaysStr(r.lastDone, r.intervalDays);
  const statusText = status==='overdue' ? t('overdueText', nextDue) : status==='due-today' ? t('dueTodayText') : t('nextDueText', nextDue);
  return `<div class="reminder-row ${status}">
    <div><div class="r-label">${r.label}</div><div class="r-meta">${t('dayCycle', r.intervalDays)} · ${statusText}</div></div>
    <div class="r-actions">
      <button class="btn-small" data-done-id="${r.id}">${t('doneBtn')}</button>
      <button class="btn-small danger" data-del-id="${r.id}">${t('deleteBtn')}</button>
    </div>
  </div>`;
}

function renderRemindersSub(content, tank){
  const reminders = tank.reminders || [];
  content.innerHTML = `
    <div class="form-inline">
      <div class="form-row" style="flex:2;"><label>${t('todoLabel')}</label><input type="text" id="remLabel" placeholder="${t('todoPlaceholder')}" /></div>
      <div class="form-row"><label>${t('intervalLabel')}</label><input type="number" id="remInterval" value="7" /></div>
    </div>
    <button class="compat-btn" id="addRemBtn">${t('addReminderBtn')}</button>
    <div style="margin-top:20px;">
      ${reminders.length ? reminders.map(reminderRowHTML).join('') : `<div class="compat-empty">${t('noReminders')}</div>`}
    </div>
  `;
  document.getElementById('addRemBtn').addEventListener('click', ()=>{
    const label = document.getElementById('remLabel').value.trim();
    const interval = parseInt(document.getElementById('remInterval').value) || 7;
    if(!label) return;
    updateTank(tank.id, tk=>{
      tk.reminders = tk.reminders || [];
      tk.reminders.push({id: uid(), label, intervalDays: interval, lastDone: todayStr()});
    });
    currentMyTankView = {mode:'detail', id: tank.id, subtab:'reminders'};
    renderMyTankPanel();
  });
  content.querySelectorAll('[data-done-id]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      updateTank(tank.id, tk=>{
        const r = (tk.reminders||[]).find(x=>x.id===btn.dataset.doneId);
        if(r) r.lastDone = todayStr();
      });
      currentMyTankView = {mode:'detail', id: tank.id, subtab:'reminders'};
      renderMyTankPanel();
    });
  });
  content.querySelectorAll('[data-del-id]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      updateTank(tank.id, tk=>{ tk.reminders = (tk.reminders||[]).filter(x=>x.id!==btn.dataset.delId); });
      currentMyTankView = {mode:'detail', id: tank.id, subtab:'reminders'};
      renderMyTankPanel();
    });
  });
}

initCompatPanel();
initTankPanel();

function applyStaticTranslations(){
  document.getElementById('eyebrowText').textContent = t('eyebrow');
  document.getElementById('appTitle').textContent = t('appTitle');
  document.getElementById('appSubtitle').textContent = t('appSubtitle', speciesList.length, Object.keys(careGroups).length);
  document.getElementById('tabBtnDex').textContent = t('tabDex');
  document.getElementById('tabBtnCompat').textContent = t('tabCompat');
  document.getElementById('tabBtnTank').textContent = t('tabTank');
  document.getElementById('tabBtnMyTank').textContent = t('tabMyTank');
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem(LANG_KEY, lang);
  applyStaticTranslations();
  initDexPanel();
  initCompatPanel();
  initTankPanel();
  renderMyTankPanel();
}

document.getElementById('langSelect').value = currentLang;
document.getElementById('langSelect').addEventListener('change', (e)=>{ setLang(e.target.value); });
applyStaticTranslations();

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('dexPanel').style.display = tab==='dex' ? '' : 'none';
    document.getElementById('compatPanelWrap').style.display = tab==='compat' ? '' : 'none';
    document.getElementById('tankPanelWrap').style.display = tab==='tank' ? '' : 'none';
    document.getElementById('myTankPanelWrap').style.display = tab==='mytank' ? '' : 'none';
    if(tab==='mytank') renderMyTankList();
  });
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
